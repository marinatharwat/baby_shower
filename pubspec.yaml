name: kerolos_invitation
description: سبوع كيرلس - Kerolos Sebou Invitation
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/bear.png
    - assets/images/plane.png
    - assets/images/blocks.png
    - assets/images/balloons.png
    - assets/images/star.png
